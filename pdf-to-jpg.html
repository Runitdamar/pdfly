<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF to JPG — Pdfly</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --charcoal: #171e19; --red: #ca0013; --gray-green: #b7c6c2;
      --bg: #f4f7f6; --bg2: #edf1f0; --card: #ffffff;
      --text: #171e19; --muted: #6b7f7a; --border: #b7c6c2;
      --shadow: 0 20px 50px -12px rgba(0,0,0,0.08);
      --radius-xl: 40px; --radius-lg: 24px; --radius-md: 16px;
      --font: 'Nunito', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(244,247,246,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 68px; }
    .logo { font-size: 1.6rem; font-weight: 900; color: var(--charcoal); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
    .logo-dot { width: 10px; height: 10px; background: var(--red); border-radius: 50%; }
    .nav-back { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--charcoal); }
    .page-wrap { max-width: 720px; margin: 0 auto; padding: 4rem 5%; }
    .tool-header { text-align: center; margin-bottom: 2.5rem; }
    .tool-icon-big { width: 72px; height: 72px; background: #fdf0ff; border: 1px solid #e9d5ff; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.2rem; }
    .tool-header h1 { font-size: 2rem; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
    .tool-header p { color: var(--muted); font-size: 0.95rem; font-weight: 500; line-height: 1.6; }
    .upload-card { background: var(--card); border-radius: var(--radius-xl); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 2.5rem; margin-bottom: 1.2rem; }
    .drop-zone { border: 2.5px dashed var(--gray-green); border-radius: var(--radius-lg); padding: 2.5rem 2rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); position: relative; }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--red); background: #fff5f5; }
    .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { width: 52px; height: 52px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 0.8rem; }
    .drop-zone h3 { font-size: 1rem; font-weight: 800; margin-bottom: 0.3rem; }
    .drop-zone p { font-size: 0.8rem; color: var(--muted); font-weight: 500; }
    .file-info-bar { display: none; align-items: center; gap: 0.8rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.8rem 1rem; margin-top: 1rem; }
    .file-info-bar.show { display: flex; }
    .fi-icon { width: 36px; height: 36px; background: #fdf0ff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .fi-text { flex: 1; }
    .fi-name { font-size: 0.85rem; font-weight: 800; }
    .fi-size { font-size: 0.73rem; color: var(--muted); font-weight: 500; }
    .fi-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; transition: color 0.2s; }
    .fi-remove:hover { color: var(--red); }
    .convert-btn { width: 100%; background: var(--red); color: #fff; border: none; padding: 1rem; border-radius: var(--radius-xl); font-weight: 900; font-size: 1rem; cursor: pointer; font-family: var(--font); margin-top: 1.2rem; transition: opacity 0.2s, transform 0.2s; }
    .convert-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-2px); }
    .convert-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress-wrap { display: none; margin-top: 1rem; }
    .progress-wrap.show { display: block; }
    .progress-bar-bg { background: var(--bg2); border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 0.5rem; }
    .progress-bar-fill { height: 100%; background: var(--red); border-radius: 99px; width: 0%; transition: width 0.3s ease; }
    .progress-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-align: center; }
    .pages-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.8rem; margin-top: 1.2rem; }
    .page-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow); }
    .page-item img { width: 100%; display: block; }
    .page-item-footer { padding: 0.6rem 0.8rem; display: flex; align-items: center; justify-content: space-between; }
    .page-num { font-size: 0.75rem; font-weight: 800; color: var(--muted); }
    .page-dl { font-size: 0.75rem; font-weight: 800; color: var(--red); text-decoration: none; transition: opacity 0.2s; }
    .page-dl:hover { opacity: 0.7; }
    .dl-all-btn { width: 100%; background: var(--charcoal); color: #fff; border: none; padding: 1rem; border-radius: var(--radius-xl); font-weight: 900; font-size: 1rem; cursor: pointer; font-family: var(--font); margin-top: 1rem; transition: opacity 0.2s, transform 0.2s; display: none; }
    .dl-all-btn.show { display: block; }
    .dl-all-btn:hover { opacity: 0.85; transform: translateY(-2px); }
    .reset-btn { width: 100%; background: transparent; color: var(--muted); border: 1.5px solid var(--border); padding: 0.8rem; border-radius: var(--radius-xl); font-weight: 700; font-size: 0.9rem; cursor: pointer; font-family: var(--font); margin-top: 0.6rem; transition: all 0.2s; display: none; }
    .reset-btn.show { display: block; }
    .reset-btn:hover { border-color: var(--charcoal); color: var(--charcoal); }
    .info-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.8rem; margin-top: 1.2rem; }
    .info-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.2rem; text-align: center; }
    .info-card .i-icon { font-size: 1.4rem; margin-bottom: 0.4rem; }
    .info-card h4 { font-size: 0.85rem; font-weight: 800; margin-bottom: 0.2rem; }
    .info-card p { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .upload-card { animation: fadeUp 0.5s ease both; }
    @media (max-width: 520px) { .info-grid { grid-template-columns: 1fr; } .pages-grid { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Pdfly <span class="logo-dot"></span></a>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>
<div class="page-wrap">
  <div class="tool-header">
    <div class="tool-icon-big">📸</div>
    <h1>PDF to JPG</h1>
    <p>Extract every page of your PDF as a high-quality JPG image.<br/>Download individually or all at once.</p>
  </div>

  <div class="upload-card">
    <div class="drop-zone" id="dropZone">
      <input type="file" accept=".pdf" id="fileInput"/>
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <p>or click to browse · Max 100MB</p>
    </div>
    <div class="file-info-bar" id="fileInfoBar">
      <div class="fi-icon">📄</div>
      <div class="fi-text">
        <div class="fi-name" id="fiName"></div>
        <div class="fi-size" id="fiSize"></div>
      </div>
      <button class="fi-remove" onclick="removeFile()">✕</button>
    </div>
    <button class="convert-btn" id="convertBtn" onclick="convertToJPG()" disabled>Extract Pages as JPG →</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">Processing...</div>
    </div>
  </div>

  <div id="pagesGrid" class="pages-grid"></div>
  <button class="dl-all-btn" id="dlAllBtn" onclick="downloadAll()">⬇ Download All JPGs</button>
  <button class="reset-btn" id="resetBtn" onclick="resetTool()">↩ Convert another PDF</button>

  <div class="info-grid">
    <div class="info-card"><div class="i-icon">🔒</div><h4>Private</h4><p>100% processed in browser</p></div>
    <div class="info-card"><div class="i-icon">⚡</div><h4>Fast</h4><p>No upload needed</p></div>
    <div class="info-card"><div class="i-icon">🆓</div><h4>Free</h4><p>Always free forever</p></div>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  let selectedFile = null;
  let pageImages = [];

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  function handleFile(file) {
    if (file.type !== 'application/pdf') return alert('Please upload a PDF file.');
    selectedFile = file;
    document.getElementById('fiName').textContent = file.name;
    document.getElementById('fiSize').textContent = formatSize(file.size);
    document.getElementById('fileInfoBar').classList.add('show');
    document.getElementById('convertBtn').disabled = false;
  }

  function removeFile() {
    selectedFile = null;
    fileInput.value = '';
    document.getElementById('fileInfoBar').classList.remove('show');
    document.getElementById('convertBtn').disabled = true;
  }

  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }

  async function convertToJPG() {
    if (!selectedFile) return;
    const btn = document.getElementById('convertBtn');
    btn.disabled = true;
    btn.textContent = 'Processing...';
    document.getElementById('progressWrap').classList.add('show');
    pageImages = [];

    try {
      const arrayBuffer = await selectedFile.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const totalPages = pdf.numPages;
      const grid = document.getElementById('pagesGrid');
      grid.innerHTML = '';

      for (let i = 1; i <= totalPages; i++) {
        const pct = Math.round((i / totalPages) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressLabel').textContent = `Extracting page ${i} of ${totalPages}...`;

        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2 });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
        pageImages.push({ dataUrl, name: `page-${i}.jpg` });

        const item = document.createElement('div');
        item.className = 'page-item';
        item.innerHTML = `
          <img src="${dataUrl}" alt="Page ${i}"/>
          <div class="page-item-footer">
            <span class="page-num">Page ${i}</span>
            <a href="${dataUrl}" download="page-${i}.jpg" class="page-dl">⬇ Save</a>
          </div>
        `;
        grid.appendChild(item);
      }

      document.getElementById('progressWrap').classList.remove('show');
      document.getElementById('dlAllBtn').classList.add('show');
      document.getElementById('resetBtn').classList.add('show');
      btn.textContent = 'Extract Pages as JPG →';
      btn.disabled = false;
    } catch (e) {
      alert('Failed: ' + e.message);
      btn.disabled = false;
      btn.textContent = 'Extract Pages as JPG →'; btn.disabled = false;
      document.getElementById('progressWrap').classList.remove('show');
    }
  }

  function downloadAll() {
    pageImages.forEach((img, i) => {
      setTimeout(() => {
        const a = document.createElement('a');
        a.href = img.dataUrl;
        a.download = img.name;
        a.click();
      }, i * 300);
    });
  }

  function resetTool() {
    removeFile();
    document.getElementById('pagesGrid').innerHTML = '';
    document.getElementById('dlAllBtn').classList.remove('show');
    document.getElementById('resetBtn').classList.remove('show');
    document.getElementById('convertBtn').textContent = 'Extract Pages as JPG →';
    document.getElementById('convertBtn').disabled = true;
    pageImages = [];
  }
</script>
</body>
</html>
